<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ====================== -->
    <!-- FAVICON - Rutas relativas corregidas -->
    <!-- ====================== -->
    
    <!-- SVG PRIMERO para máxima calidad -->
    <link rel="icon" type="image/svg+xml" href="/file.svg">
    
    <!-- Versiones PNG -->
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    
    <!-- Versiones estándar -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    
    <!-- Favicon .ico -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest">
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#3B82F6">
    <meta name="msapplication-TileColor" content="#3B82F6">
    
    <!-- ====================== -->
    <!-- META TAGS & SEO -->
    <!-- ====================== -->
    
    <title>GonBoost - Servicios Profesionales de Boosting para Gamers</title>
    <meta name="description" content="Mejora tu rank en Valorant, LoL, Diablo y más con nuestro equipo elite de boosters profesionales. Servicio seguro, rápido y confiable.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gonboost.com/">
    <meta property="og:title" content="GonBoost - Servicios Profesionales de Boosting para Gamers">
    <meta property="og:description" content="Mejora tu rank en Valorant, LoL, Diablo y más con nuestro equipo elite de boosters profesionales.">
    <meta property="og:image" content="https://gonboost.com/images/og/gonboost-og.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="GonBoost">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://gonboost.com/">
    <meta property="twitter:title" content="GonBoost - Servicios Profesionales de Boosting para Gamers">
    <meta property="twitter:description" content="Mejora tu rank en Valorant, LoL, Diablo y más con nuestro equipo elite de boosters profesionales.">
    <meta property="twitter:image" content="https://gonboost.com/images/og/gonboost-og.jpg">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://gonboost.com/" />

    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="dns-prefetch" href="//www.googletagmanager.com">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "GonBoost",
      "url": "https://gonboost.com",
      "logo": "https://gonboost.com/images/logo.png",
      "description": "Servicios profesionales de boosting para gamers.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "ES"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "support@gonboost.com"
      }
    }
    </script>

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
